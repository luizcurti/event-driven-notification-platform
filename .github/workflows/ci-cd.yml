name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test

      - name: Integration Tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  e2e-localstack:
    runs-on: ubuntu-latest
    needs: validate
    env:
      LOCALSTACK_PROFILE: e2e-localstack
      LOCALSTACK_ENDPOINT: http://localhost:4566
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Start LocalStack (Dedicated Profile)
        run: docker compose -f docker-compose.localstack.yml --profile e2e-localstack up -d

      - name: Wait for LocalStack Health
        run: curl -fsS http://localhost:4566/_localstack/health --retry 60 --retry-delay 2 --retry-all-errors --retry-connrefused > /dev/null

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Stop LocalStack
        if: always()
        run: docker compose -f docker-compose.localstack.yml --profile e2e-localstack down --remove-orphans

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [validate, e2e-localstack]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Plan
        run: |
          cd terraform
          terraform init
          terraform plan
